<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacts — WhatsApp Scheduler</title>
  <script defer src="https://unpkg.com/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/app.css">
  <style>
    .navbar-brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.25rem; }
    .navbar-right { display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.9rem; }
    .nav-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
    .nav-pill { padding: 0.45rem 1rem; border-radius: 20px; background: #e2e8f0; color: #4a5568; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: background 0.15s; }
    .nav-pill:hover, .nav-pill.active { background: #25D366; color: #fff; }
    .tab-buttons { display: flex; gap: 0; margin-bottom: 1.25rem; border-radius: 8px; overflow: hidden; border: 2px solid #25D366; }
    .tab-btn { flex: 1; padding: 0.65rem; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; background: #fff; color: #25D366; transition: background 0.15s, color 0.15s; }
    .tab-btn.active { background: #25D366; color: #fff; }
    .card { margin-bottom: 1.25rem; cursor: default; }
    .card:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    th { text-align: left; padding: 0.6rem 0.75rem; border-bottom: 2px solid #e2e8f0; color: #4a5568; font-size: 0.85rem; font-weight: 700; }
    td { padding: 0.65rem 0.75rem; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .action-btns { display: flex; gap: 0.4rem; }
    .btn-xs { padding: 0.3rem 0.65rem; font-size: 0.82rem; }
    .empty-state { text-align: center; color: #a0aec0; padding: 2rem 0; font-size: 0.95rem; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .modal h2 { margin-bottom: 1.25rem; font-size: 1.3rem; }
    .modal-footer { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .modal-footer .btn { flex: 1; }
    .group-item { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 0.75rem; overflow: hidden; }
    .group-header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; background: #f7fafc; }
    .group-body { padding: 1rem; border-top: 1px solid #e2e8f0; background: #fff; }
    .member-list { list-style: none; margin-bottom: 0.75rem; }
    .member-item { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; border-bottom: 1px solid #f0f2f5; font-size: 0.95rem; }
    .member-item:last-child { border-bottom: none; }
    .add-member-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .add-member-row select { flex: 1; padding: 0.55rem 0.75rem; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 0.95rem; }
    .new-group-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .new-group-row input { flex: 1; }
  </style>
</head>
<body>
  <div x-data="contactsApp()" x-init="init()">
    <nav class="navbar">
      <a href="/dashboard.html" class="navbar-brand">📅 WA Scheduler</a>
      <div class="navbar-right">
        <span x-text="user?.name"></span>
        <button class="btn btn-sm btn-secondary" @click="logout()">Logout</button>
      </div>
    </nav>

    <main class="container" style="max-width:700px">
      <div class="nav-pills">
        <a href="/dashboard.html" class="nav-pill">🏠 Dashboard</a>
        <a href="/contacts.html" class="nav-pill active">👥 Contacts</a>
        <a href="/templates.html" class="nav-pill">📝 Templates</a>
        <a href="/schedules.html" class="nav-pill">⏰ Schedules</a>
        <a href="/history.html" class="nav-pill">📜 History</a>
      </div>

      <h1 class="page-title">👥 Contacts &amp; Groups</h1>

      <!-- Tab buttons -->
      <div class="tab-buttons">
        <button class="tab-btn" :class="{active: activeTab==='contacts'}" @click="activeTab='contacts'">Contacts</button>
        <button class="tab-btn" :class="{active: activeTab==='groups'}" @click="activeTab='groups'">Groups</button>
      </div>

      <!-- CONTACTS TAB -->
      <div x-show="activeTab === 'contacts'">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <strong style="font-size:1rem">All Contacts (<span x-text="contacts.length"></span>)</strong>
            <button class="btn btn-sm" @click="openImport()">⬇ Import from WhatsApp</button>
            <button class="btn btn-sm" @click="openModal(null)">+ Add Contact</button>
          </div>

          <template x-if="contacts.length === 0">
            <div class="empty-state">No contacts yet. Add one to get started!</div>
          </template>

          <div x-show="contacts.length > 0" style="overflow-x:auto">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Phone</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="c in contacts" :key="c.id">
                  <tr>
                    <td x-text="c.name"></td>
                    <td x-text="c.phone"></td>
                    <td>
                      <div class="action-btns">
                        <button class="btn btn-sm btn-xs btn-secondary" @click="openModal(c)">✏️ Edit</button>
                        <button class="btn btn-sm btn-xs btn-danger" @click="deleteContact(c.id)">🗑️ Delete</button>
                      </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- GROUPS TAB -->
      <div x-show="activeTab === 'groups'">
        <div class="card">
          <div style="margin-bottom:1rem">
            <strong style="font-size:1rem">Groups (<span x-text="groups.length"></span>)</strong>
          </div>

          <!-- New group form -->
          <div class="new-group-row">
            <input class="input" type="text" placeholder="New group name…" x-model="newGroupName">
            <button class="btn btn-sm" @click="createGroup()" :disabled="!newGroupName.trim()">+ Create</button>
          </div>

          <template x-if="groups.length === 0">
            <div class="empty-state">No groups yet. Create one above!</div>
          </template>

          <template x-for="g in groups" :key="g.id">
            <div class="group-item">
              <div class="group-header">
                <div>
                  <strong x-text="g.name"></strong>
                  <span style="margin-left:0.5rem;color:#718096;font-size:0.9rem" x-text="'(' + (g.memberCount || 0) + ' members)'"></span>
                </div>
                <div class="action-btns">
                  <button class="btn btn-sm btn-xs btn-secondary" @click="toggleGroup(g.id)">
                    <span x-text="expandedGroup === g.id ? '▲ Close' : '▼ Manage'"></span>
                  </button>
                  <button class="btn btn-sm btn-xs btn-danger" @click="deleteGroup(g.id)">🗑️</button>
                </div>
              </div>

              <div class="group-body" x-show="expandedGroup === g.id" x-cloak>
                <p style="font-size:0.9rem;color:#4a5568;margin-bottom:0.5rem;font-weight:600">Members:</p>
                <template x-if="!g.members || g.members.length === 0">
                  <p style="color:#a0aec0;font-size:0.9rem;margin-bottom:0.5rem">No members yet.</p>
                </template>
                <ul class="member-list">
                  <template x-for="m in (g.members || [])" :key="m.id">
                    <li class="member-item">
                      <span><strong x-text="m.name"></strong> <span style="color:#718096" x-text="m.phone"></span></span>
                      <button class="btn btn-sm btn-xs btn-danger" @click="removeMember(g.id, m.id)">Remove</button>
                    </li>
                  </template>
                </ul>
                <div class="add-member-row">
                  <select x-model="addMemberContactId">
                    <option value="">— Add a contact —</option>
                    <template x-for="c in availableContacts(g)" :key="c.id">
                      <option :value="c.id" x-text="c.name + ' (' + c.phone + ')'"></option>
                    </template>
                  </select>
                  <button class="btn btn-sm" @click="addMember(g.id)" :disabled="!addMemberContactId">Add</button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <div class="error-msg" x-show="error" x-text="error"></div>
    </main>

    <!-- Contact Modal -->
    <div class="modal-overlay" x-show="showModal" x-cloak @click.self="closeModal()">
      <div class="modal">
        <h2 x-text="editingContact ? 'Edit Contact' : 'Add Contact'"></h2>

        <div class="form-group">
          <label for="c-name">Name</label>
          <input id="c-name" class="input" type="text" placeholder="e.g. Mum" x-model="form.name">
        </div>

        <div class="form-group">
          <label for="c-phone">Phone Number</label>
          <input id="c-phone" class="input" type="tel" placeholder="+91XXXXXXXXXX" x-model="form.phone">
          <div class="error-msg" x-show="formError" x-text="formError" style="text-align:left"></div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" @click="closeModal()">Cancel</button>
          <button class="btn" @click="saveContact()" :disabled="saving">
            <span class="spinner" x-show="saving"></span>
            <span x-text="saving ? 'Saving…' : 'Save'"></span>
          </button>
        </div>
      </div>
    <!-- Import from WhatsApp modal -->
    <div class="modal-overlay" x-show="showImport" x-cloak @click.self="showImport=false">
      <div class="modal" style="max-width:500px;max-height:80vh;display:flex;flex-direction:column">
        <h2>Import from WhatsApp</h2>
        <div x-show="importLoading" style="text-align:center;padding:2rem">Loading contacts…</div>
        <template x-if="!importLoading">
          <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
            <template x-if="importContacts.length === 0">
              <div style="padding:1rem;color:#666">
                No new contacts to import. Either WhatsApp hasn't synced yet (connect first) or all contacts are already saved.
              </div>
            </template>
            <template x-if="importContacts.length > 0">
              <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
                  <span style="font-size:0.9rem;color:#666" x-text="`${importContacts.length} new contacts found`"></span>
                  <button class="btn btn-sm" style="background:#f1f5f9;color:#333" @click="toggleImportAll()">Toggle All</button>
                </div>
                <div style="overflow-y:auto;flex:1;border:1px solid #e2e8f0;border-radius:8px">
                  <template x-for="c in importContacts" :key="c.phone">
                    <label style="display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1rem;border-bottom:1px solid #f1f5f9;cursor:pointer">
                      <input type="checkbox" :checked="importSelected[c.phone]" @change="importSelected[c.phone] = $event.target.checked" style="width:18px;height:18px">
                      <div>
                        <div style="font-weight:500" x-text="c.name"></div>
                        <div style="font-size:0.85rem;color:#888" x-text="c.phone"></div>
                      </div>
                    </label>
                  </template>
                </div>
              </div>
            </template>
            <div x-show="importStatus" style="margin-top:0.75rem;font-size:0.9rem;color:#16a34a" x-text="importStatus"></div>
            <div style="display:flex;gap:0.5rem;margin-top:1rem">
              <button class="btn" @click="doImport()"
                :disabled="!importContacts.some(c => importSelected[c.phone])"
                x-text="`Import Selected (${importContacts.filter(c => importSelected[c.phone]).length})`">
              </button>
              <button class="btn btn-danger" @click="showImport=false">Cancel</button>
            </div>
          </div>
        </template>
      </div>
    </div>
    </div>
  </div>

  <script>
    function contactsApp() {
      return {
        user: null,
        contacts: [],
        groups: [],
        activeTab: 'contacts',
        showModal: false,
        editingContact: null,
        form: { name: '', phone: '' },
        formError: '',
        saving: false,
        error: '',
        showImport: false,
        importContacts: [],
        importSelected: {},
        importLoading: false,
        importStatus: '',
        newGroupName: '',
        expandedGroup: null,
        addMemberContactId: '',

        async apiFetch(url, opts = {}) {
          const res = await fetch(url, { credentials: 'include', ...opts });
          if (res.status === 401) { window.location.href = '/'; return null; }
          return res;
        },

        async init() {
          const meRes = await this.apiFetch('/api/auth/me');
          if (!meRes) return;
          this.user = await meRes.json();
          await Promise.all([this.loadContacts(), this.loadGroups()]);
        },

        async loadContacts() {
          const res = await this.apiFetch('/api/contacts');
          if (!res) return;
          this.contacts = await res.json();
        },

        async loadGroups() {
          const res = await this.apiFetch('/api/groups');
          if (!res) return;
          const data = await res.json();
          // Load members for each group
          this.groups = data;
          await Promise.all(this.groups.map(g => this.loadGroupMembers(g)));
        },

        async loadGroupMembers(group) {
          const res = await this.apiFetch(`/api/groups/${group.id}/members`);
          if (!res) return;
          const members = await res.json();
          group.members = members;
          group.memberCount = members.length;
          // trigger reactivity
          this.groups = [...this.groups];
        },

        openModal(contact) {
          this.editingContact = contact;
          this.form = contact ? { name: contact.name, phone: contact.phone } : { name: '', phone: '' };
          this.formError = '';
          this.showModal = true;
        },

        closeModal() {
          this.showModal = false;
          this.editingContact = null;
          this.formError = '';
        },

        validateForm() {
          if (!this.form.name.trim()) { this.formError = 'Name is required.'; return false; }
          if (!this.form.phone.match(/^\+\d{7,15}$/)) {
            this.formError = 'Phone must start with + followed by digits (e.g. +91XXXXXXXXXX).';
            return false;
          }
          return true;
        },

        async saveContact() {
          if (!this.validateForm()) return;
          this.saving = true;
          this.error = '';
          try {
            let res;
            if (this.editingContact) {
              res = await this.apiFetch(`/api/contacts/${this.editingContact.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.form),
              });
            } else {
              res = await this.apiFetch('/api/contacts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.form),
              });
            }
            if (!res) return;
            if (!res.ok) {
              const d = await res.json();
              this.formError = d.error || 'Save failed.';
              return;
            }
            await this.loadContacts();
            this.closeModal();
          } catch (e) {
            this.formError = 'Network error.';
          } finally {
            this.saving = false;
          }
        },

        async deleteContact(id) {
          if (!confirm('Delete this contact?')) return;
          const res = await this.apiFetch(`/api/contacts/${id}`, { method: 'DELETE' });
          if (res) await this.loadContacts();
        },

        async createGroup() {
          const name = this.newGroupName.trim();
          if (!name) return;
          const res = await this.apiFetch('/api/groups', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
          });
          if (!res) return;
          if (res.ok) {
            this.newGroupName = '';
            await this.loadGroups();
          } else {
            const d = await res.json();
            this.error = d.error || 'Could not create group.';
          }
        },

        async deleteGroup(id) {
          if (!confirm('Delete this group?')) return;
          const res = await this.apiFetch(`/api/groups/${id}`, { method: 'DELETE' });
          if (res) await this.loadGroups();
        },

        toggleGroup(id) {
          this.expandedGroup = this.expandedGroup === id ? null : id;
          this.addMemberContactId = '';
        },

        availableContacts(group) {
          const memberIds = (group.members || []).map(m => m.id);
          return this.contacts.filter(c => !memberIds.includes(c.id));
        },

        async addMember(groupId) {
          if (!this.addMemberContactId) return;
          const res = await this.apiFetch(`/api/groups/${groupId}/members`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contactId: Number(this.addMemberContactId) }),
          });
          if (!res) return;
          this.addMemberContactId = '';
          await this.loadGroups();
          this.expandedGroup = groupId;
        },

        async removeMember(groupId, contactId) {
          const res = await this.apiFetch(`/api/groups/${groupId}/members/${contactId}`, { method: 'DELETE' });
          if (!res) return;
          await this.loadGroups();
          this.expandedGroup = groupId;
        },

        async openImport() {
          this.importLoading = true;
          this.importStatus = '';
          this.importSelected = {};
          this.showImport = true;
          const res = await this.apiFetch('/api/whatsapp/contacts');
          this.importLoading = false;
          if (!res) return;
          const all = await res.json();
          // Filter out already-saved contacts by phone
          const existing = new Set(this.contacts.map(c => c.phone));
          this.importContacts = all.filter(c => !existing.has(c.phone));
        },

        toggleImportAll() {
          const allSelected = this.importContacts.every(c => this.importSelected[c.phone]);
          this.importContacts.forEach(c => { this.importSelected[c.phone] = !allSelected; });
        },

        async doImport() {
          const toImport = this.importContacts.filter(c => this.importSelected[c.phone]);
          if (!toImport.length) return;
          this.importStatus = `Importing ${toImport.length} contacts…`;
          let done = 0;
          for (const c of toImport) {
            const res = await this.apiFetch('/api/contacts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: c.name, phone: c.phone }),
            });
            if (res?.ok) done++;
          }
          this.importStatus = `✅ Imported ${done} of ${toImport.length} contacts.`;
          await this.loadContacts();
          setTimeout(() => { this.showImport = false; this.importStatus = ''; }, 1500);
        },

        async logout() {
          await this.apiFetch('/api/auth/logout', { method: 'POST' });
          window.location.href = '/';
        },
      };
    }
  </script>
</body>
</html>
