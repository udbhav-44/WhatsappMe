<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhatsApp Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app.css">
  <script defer src="https://unpkg.com/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body>
  <div class="login-wrap" x-data="login()" x-init="init()" x-cloak>
    <div class="login-card enter">

      <!-- Brand -->
      <div class="brand">Ping<span class="mark-dot">.</span></div>
      <div class="tagline">Scheduled WhatsApp messages, made simple.</div>

      <!-- Loading -->
      <template x-if="mode === 'loading'">
        <div style="padding:1.5rem 0"><span class="spinner dark"></span></div>
      </template>

      <!-- Choose user -->
      <template x-if="mode === 'users'">
        <div>
          <div class="user-grid">
            <template x-for="u in users" :key="u.id">
              <div class="user-tile" @click="pick(u)">
                <div class="avatar" x-text="u.name.charAt(0).toUpperCase()"></div>
                <div class="u-name" x-text="u.name"></div>
              </div>
            </template>
            <div class="user-tile add" @click="mode='adduser'; resetForm()">
              <div class="avatar">+</div>
              <div class="u-name" style="color:var(--muted)">Add person</div>
            </div>
          </div>
        </div>
      </template>

      <!-- PIN entry -->
      <template x-if="mode === 'pin'">
        <div>
          <h2 style="font-size:1.4rem" x-text="'Hello, ' + (selected?.name || '')"></h2>
          <p class="tagline" style="margin:.4rem 0 0">Enter your 4-digit PIN</p>
          <div class="pin-row">
            <template x-for="i in [0,1,2,3]" :key="i">
              <input class="pin-box" type="password" inputmode="numeric" maxlength="1"
                :id="'pin-'+i" x-model="pin[i]"
                @input="onPin($event, i)" @keydown="onPinKey($event, i)">
            </template>
          </div>
          <div class="err" x-show="error" x-text="error"></div>
          <button class="btn btn-block" @click="doLogin()" :disabled="loading">
            <span x-show="loading" class="spinner"></span>
            <span x-text="loading ? 'Checking…' : 'Continue'"></span>
          </button>
          <button class="btn btn-quiet" style="margin-top:.6rem" @click="mode='users'; error=''">Back</button>
        </div>
      </template>

      <!-- First-run setup -->
      <template x-if="mode === 'setup'">
        <div style="text-align:left">
          <h2 style="font-size:1.4rem;text-align:center">Welcome</h2>
          <p class="tagline" style="text-align:center;margin:.4rem 0 1.5rem">Create the first account to begin.</p>
          <div class="field">
            <label>Your name</label>
            <input class="input" type="text" x-model="form.name" placeholder="e.g. Dad" @keydown.enter="doSetup()">
          </div>
          <div class="field">
            <label>Choose a 4-digit PIN</label>
            <div class="pin-row" style="margin:.5rem 0 0;justify-content:flex-start">
              <template x-for="i in [0,1,2,3]" :key="i">
                <input class="pin-box" type="password" inputmode="numeric" maxlength="1"
                  :id="'sp-'+i" x-model="form.pin[i]"
                  @input="onSetupPin($event, i, 'sp-')" @keydown="onSetupPinKey($event, i, 'sp-')">
              </template>
            </div>
          </div>
          <div class="err" x-show="error" x-text="error"></div>
          <button class="btn btn-block" style="margin-top:.5rem" @click="doSetup()" :disabled="loading">
            <span x-show="loading" class="spinner"></span>
            <span x-text="loading ? 'Creating…' : 'Create account'"></span>
          </button>
        </div>
      </template>

      <!-- Add user (requires being logged in) -->
      <template x-if="mode === 'adduser'">
        <div style="text-align:left">
          <h2 style="font-size:1.4rem;text-align:center">Add a person</h2>
          <p class="tagline" style="text-align:center;margin:.4rem 0 1.5rem">You must be signed in already to add another.</p>
          <div class="field">
            <label>Name</label>
            <input class="input" type="text" x-model="form.name" placeholder="e.g. Dad" @keydown.enter="doAddUser()">
          </div>
          <div class="field">
            <label>4-digit PIN</label>
            <div class="pin-row" style="margin:.5rem 0 0;justify-content:flex-start">
              <template x-for="i in [0,1,2,3]" :key="i">
                <input class="pin-box" type="password" inputmode="numeric" maxlength="1"
                  :id="'ap-'+i" x-model="form.pin[i]"
                  @input="onSetupPin($event, i, 'ap-')" @keydown="onSetupPinKey($event, i, 'ap-')">
              </template>
            </div>
          </div>
          <div class="err" x-show="error" x-text="error"></div>
          <div style="display:flex;gap:.6rem;margin-top:.5rem">
            <button class="btn btn-ghost btn-block" @click="mode='users'; error=''">Cancel</button>
            <button class="btn btn-block" @click="doAddUser()" :disabled="loading">
              <span x-text="loading ? 'Adding…' : 'Add'"></span>
            </button>
          </div>
        </div>
      </template>

    </div>
  </div>

  <script>
    function login() {
      return {
        mode: 'loading',
        users: [],
        selected: null,
        pin: ['', '', '', ''],
        form: { name: '', pin: ['', '', '', ''] },
        loading: false,
        error: '',

        async init() {
          try {
            const res = await fetch('/api/auth/users');
            const data = await res.json();
            if (!Array.isArray(data) || data.length === 0) {
              this.mode = 'setup';
            } else {
              this.users = data;
              this.mode = 'users';
            }
          } catch (e) {
            this.error = 'Could not reach the server.';
            this.mode = 'users';
          }
        },

        resetForm() { this.form = { name: '', pin: ['', '', '', ''] }; this.error = ''; },

        pick(u) {
          this.selected = u;
          this.pin = ['', '', '', ''];
          this.error = '';
          this.mode = 'pin';
          this.$nextTick(() => document.getElementById('pin-0')?.focus());
        },

        onPin(e, i) {
          const v = e.target.value.replace(/\D/g, '');
          this.pin[i] = v;
          e.target.value = v;
          if (v && i < 3) document.getElementById('pin-'+(i+1))?.focus();
          if (this.pin.every(d => d !== '')) this.doLogin();
        },
        onPinKey(e, i) {
          if (e.key === 'Backspace' && !this.pin[i] && i > 0) document.getElementById('pin-'+(i-1))?.focus();
        },
        onSetupPin(e, i, pfx) {
          const v = e.target.value.replace(/\D/g, '');
          this.form.pin[i] = v;
          e.target.value = v;
          if (v && i < 3) document.getElementById(pfx+(i+1))?.focus();
        },
        onSetupPinKey(e, i, pfx) {
          if (e.key === 'Backspace' && !this.form.pin[i] && i > 0) document.getElementById(pfx+(i-1))?.focus();
        },

        async doLogin() {
          if (this.loading) return;
          const pin = this.pin.join('');
          if (!/^\d{4}$/.test(pin)) { this.error = 'Enter your 4-digit PIN.'; return; }
          this.loading = true; this.error = '';
          try {
            const res = await fetch('/api/auth/login', {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ userId: this.selected.id, pin }),
            });
            if (res.ok) { window.location.href = '/app.html'; return; }
            const d = await res.json();
            this.error = d.error || 'Wrong PIN.';
            this.pin = ['', '', '', ''];
            this.$nextTick(() => document.getElementById('pin-0')?.focus());
          } catch (e) { this.error = 'Network error.'; }
          finally { this.loading = false; }
        },

        async doSetup() {
          if (this.loading) return;
          const name = this.form.name.trim();
          const pin = this.form.pin.join('');
          if (!name) { this.error = 'Please enter your name.'; return; }
          if (!/^\d{4}$/.test(pin)) { this.error = 'Please enter a 4-digit PIN.'; return; }
          this.loading = true; this.error = '';
          try {
            const res = await fetch('/api/auth/setup', {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, pin }),
            });
            const d = await res.json();
            if (res.ok && d.ok) {
              const lr = await fetch('/api/auth/login', {
                method: 'POST', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: d.user.id, pin }),
              });
              if (lr.ok) { window.location.href = '/app.html'; return; }
              await this.init();
            } else { this.error = d.error || 'Setup failed.'; }
          } catch (e) { this.error = 'Network error.'; }
          finally { this.loading = false; }
        },

        async doAddUser() {
          if (this.loading) return;
          const name = this.form.name.trim();
          const pin = this.form.pin.join('');
          if (!name) { this.error = 'Please enter a name.'; return; }
          if (!/^\d{4}$/.test(pin)) { this.error = 'Please enter a 4-digit PIN.'; return; }
          this.loading = true; this.error = '';
          try {
            const res = await fetch('/api/auth/users', {
              method: 'POST', credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, pin }),
            });
            const d = await res.json();
            if (res.ok && d.ok) { this.resetForm(); await this.init(); this.mode = 'users'; }
            else if (res.status === 401) { this.error = 'Sign in first, then add another person from Settings.'; }
            else { this.error = d.error || 'Could not add.'; }
          } catch (e) { this.error = 'Network error.'; }
          finally { this.loading = false; }
        },
      };
    }
  </script>
</body>
</html>
