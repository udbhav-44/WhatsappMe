<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Templates — WhatsApp Scheduler</title>
  <script defer src="https://unpkg.com/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/app.css">
  <style>
    .navbar-brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.25rem; }
    .navbar-right { display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.9rem; }
    .nav-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
    .nav-pill { padding: 0.45rem 1rem; border-radius: 20px; background: #e2e8f0; color: #4a5568; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: background 0.15s; }
    .nav-pill:hover, .nav-pill.active { background: #25D366; color: #fff; }
    .layout { display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; }
    @media (max-width: 600px) { .layout { grid-template-columns: 1fr; } }
    .card { cursor: default; margin-bottom: 0; }
    .card:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .template-item { padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; border: 2px solid transparent; transition: background 0.12s, border-color 0.12s; }
    .template-item:hover { background: #f0f2f5; }
    .template-item.active { border-color: #25D366; background: #f0fff4; }
    .template-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .template-preview { font-size: 0.82rem; color: #718096; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .var-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.5rem 0 1rem; }
    .chip { padding: 0.3rem 0.75rem; border-radius: 20px; background: #bee3f8; color: #2c5282; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: background 0.12s; user-select: none; }
    .chip:hover { background: #90cdf4; }
    textarea.input { resize: vertical; font-family: inherit; min-height: 160px; }
    .preview-box { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; min-height: 60px; color: #2d3748; }
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .btn-row .btn { flex: 1; min-width: 80px; }
    .empty-state { text-align: center; color: #a0aec0; padding: 2rem 0; font-size: 0.95rem; }
    select.input { height: auto; }
    .section-label { font-size: 0.82rem; font-weight: 700; color: #4a5568; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div x-data="templatesApp()" x-init="init()">
    <nav class="navbar">
      <a href="/dashboard.html" class="navbar-brand">📅 WA Scheduler</a>
      <div class="navbar-right">
        <span x-text="user?.name"></span>
        <button class="btn btn-sm btn-secondary" @click="logout()">Switch User</button>
      </div>
    </nav>

    <main class="container" style="max-width:900px">
      <div class="nav-pills">
        <a href="/dashboard.html" class="nav-pill">🏠 Dashboard</a>
        <a href="/contacts.html" class="nav-pill">👥 Contacts</a>
        <a href="/templates.html" class="nav-pill active">📝 Templates</a>
        <a href="/schedules.html" class="nav-pill">⏰ Schedules</a>
        <a href="/history.html" class="nav-pill">📜 History</a>
      </div>

      <h1 class="page-title">📝 Message Templates</h1>

      <div class="layout">
        <!-- LEFT: template list -->
        <div class="card" style="height:fit-content;padding:1rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
            <strong style="font-size:0.95rem">Templates (<span x-text="templates.length"></span>)</strong>
            <button class="btn btn-sm" @click="newTemplate()">+ New</button>
          </div>
          <template x-if="templates.length === 0">
            <div class="empty-state" style="padding:1rem 0">No templates yet.</div>
          </template>
          <template x-for="t in templates" :key="t.id">
            <div class="template-item" :class="{active: editing && editing.id === t.id}" @click="selectTemplate(t)">
              <div class="template-name" x-text="t.name"></div>
              <div class="template-preview" x-text="t.body ? t.body.slice(0,60) : ''"></div>
            </div>
          </template>
        </div>

        <!-- RIGHT: editor -->
        <div class="card" style="padding:1.25rem">
          <template x-if="!editing && templates.length > 0 && !isNew">
            <div class="empty-state" style="padding:3rem 0">Select a template to edit, or click <strong>+ New</strong></div>
          </template>

          <div x-show="editing || isNew">
            <div class="form-group">
              <label for="t-name">Template Name</label>
              <input id="t-name" class="input" type="text" placeholder="e.g. Morning Greeting" x-model="form.name">
            </div>

            <div class="form-group">
              <label for="t-body">Message Body</label>
              <div class="section-label" style="margin-bottom:0.4rem">Click to insert variable:</div>
              <div class="var-chips">
                <button class="chip" @click="insertVar('{{name}}')" type="button">{{name}}</button>
                <button class="chip" @click="insertVar('{{date}}')" type="button">{{date}}</button>
                <button class="chip" @click="insertVar('{{day}}')" type="button">{{day}}</button>
                <button class="chip" @click="insertVar('{{time}}')" type="button">{{time}}</button>
              </div>
              <textarea
                id="t-body"
                class="input"
                rows="6"
                placeholder="Good morning {{name}}! Today is {{day}}, {{date}}."
                x-model="form.body"
                x-ref="bodyTextarea"
              ></textarea>
            </div>

            <!-- Preview -->
            <div class="form-group">
              <label>Preview</label>
              <div class="section-label" style="margin-bottom:0.4rem">Preview with contact (optional):</div>
              <select class="input" x-model="previewContactId" style="margin-bottom:0.5rem">
                <option value="">— No contact (use placeholders) —</option>
                <template x-for="c in contacts" :key="c.id">
                  <option :value="c.id" x-text="c.name + ' (' + c.phone + ')'"></option>
                </template>
              </select>
              <button class="btn btn-sm btn-secondary" @click="previewTemplate()" :disabled="previewing || !form.body">
                <span class="spinner" x-show="previewing"></span>
                Preview
              </button>
              <div class="preview-box" style="margin-top:0.75rem" x-show="preview">
                <span x-text="preview"></span>
              </div>
            </div>

            <div class="error-msg" x-show="formError" x-text="formError" style="text-align:left"></div>

            <div class="btn-row">
              <button class="btn" @click="saveTemplate()" :disabled="saving">
                <span class="spinner" x-show="saving"></span>
                <span x-text="saving ? 'Saving…' : 'Save'"></span>
              </button>
              <button class="btn btn-danger" @click="deleteTemplate()" x-show="editing && !isNew" :disabled="saving">Delete</button>
              <button class="btn btn-secondary" @click="cancelEdit()">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <div class="error-msg" x-show="error" x-text="error" style="margin-top:1rem"></div>
    </main>
  </div>

  <script>
    function templatesApp() {
      return {
        user: null,
        templates: [],
        contacts: [],
        editing: null,
        isNew: false,
        form: { name: '', body: '' },
        preview: '',
        previewContactId: '',
        previewing: false,
        saving: false,
        error: '',
        formError: '',

        async apiFetch(url, opts = {}) {
          const res = await fetch(url, { credentials: 'include', ...opts });
          if (res.status === 401) { window.location.href = '/'; return null; }
          return res;
        },

        async init() {
          const meRes = await this.apiFetch('/api/auth/me');
          if (!meRes) return;
          this.user = await meRes.json();
          await Promise.all([this.loadTemplates(), this.loadContacts()]);
        },

        async loadTemplates() {
          const res = await this.apiFetch('/api/templates');
          if (!res) return;
          this.templates = await res.json();
        },

        async loadContacts() {
          const res = await this.apiFetch('/api/contacts');
          if (!res) return;
          this.contacts = await res.json();
        },

        selectTemplate(t) {
          this.editing = t;
          this.isNew = false;
          this.form = { name: t.name, body: t.body };
          this.preview = '';
          this.formError = '';
        },

        newTemplate() {
          this.editing = null;
          this.isNew = true;
          this.form = { name: '', body: '' };
          this.preview = '';
          this.formError = '';
        },

        cancelEdit() {
          this.editing = null;
          this.isNew = false;
          this.preview = '';
          this.formError = '';
        },

        insertVar(variable) {
          const ta = this.$refs.bodyTextarea;
          if (!ta) {
            this.form.body += variable;
            return;
          }
          const start = ta.selectionStart;
          const end = ta.selectionEnd;
          const before = this.form.body.slice(0, start);
          const after = this.form.body.slice(end);
          this.form.body = before + variable + after;
          this.$nextTick(() => {
            ta.focus();
            ta.setSelectionRange(start + variable.length, start + variable.length);
          });
        },

        async previewTemplate() {
          if (!this.form.body) return;
          this.previewing = true;
          this.preview = '';
          try {
            // If we have an existing template with an ID, use the preview endpoint
            if (this.editing && this.editing.id) {
              const body = {};
              if (this.previewContactId) body.contactId = Number(this.previewContactId);
              const res = await this.apiFetch(`/api/templates/${this.editing.id}/preview`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
              });
              if (res && res.ok) {
                const data = await res.json();
                this.preview = data.rendered || data.preview || JSON.stringify(data);
                return;
              }
            }
            // Fallback: client-side substitution
            const contact = this.contacts.find(c => String(c.id) === String(this.previewContactId));
            const now = new Date();
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            let rendered = this.form.body;
            rendered = rendered.replace(/{{name}}/g, contact ? contact.name : '[Name]');
            rendered = rendered.replace(/{{date}}/g, now.toLocaleDateString());
            rendered = rendered.replace(/{{day}}/g, days[now.getDay()]);
            rendered = rendered.replace(/{{time}}/g, now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
            this.preview = rendered;
          } catch (e) {
            this.preview = '(Preview error)';
          } finally {
            this.previewing = false;
          }
        },

        async saveTemplate() {
          this.formError = '';
          if (!this.form.name.trim()) { this.formError = 'Name is required.'; return; }
          if (!this.form.body.trim()) { this.formError = 'Message body is required.'; return; }
          this.saving = true;
          try {
            let res;
            if (this.editing && this.editing.id) {
              res = await this.apiFetch(`/api/templates/${this.editing.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.form),
              });
            } else {
              res = await this.apiFetch('/api/templates', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.form),
              });
            }
            if (!res) return;
            if (!res.ok) {
              const d = await res.json();
              this.formError = d.error || 'Save failed.';
              return;
            }
            const saved = await res.json();
            await this.loadTemplates();
            this.editing = saved;
            this.isNew = false;
          } catch (e) {
            this.formError = 'Network error.';
          } finally {
            this.saving = false;
          }
        },

        async deleteTemplate() {
          if (!this.editing || !this.editing.id) return;
          if (!confirm('Delete this template?')) return;
          const res = await this.apiFetch(`/api/templates/${this.editing.id}`, { method: 'DELETE' });
          if (res) {
            await this.loadTemplates();
            this.editing = null;
            this.isNew = false;
          }
        },

        async logout() {
          await this.apiFetch('/api/auth/logout', { method: 'POST' });
          window.location.href = '/';
        },
      };
    }
  </script>
</body>
</html>
