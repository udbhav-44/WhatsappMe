<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedules — WhatsApp Scheduler</title>
  <script defer src="https://unpkg.com/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/app.css">
  <style>
    .navbar-brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.25rem; }
    .navbar-right { display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.9rem; }
    .nav-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
    .nav-pill { padding: 0.45rem 1rem; border-radius: 20px; background: #e2e8f0; color: #4a5568; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: background 0.15s; }
    .nav-pill:hover, .nav-pill.active { background: #25D366; color: #fff; }
    .card { cursor: default; margin-bottom: 1rem; }
    .card:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .sched-card { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
    .sched-info { flex: 1; }
    .sched-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.2rem; }
    .sched-meta { font-size: 0.9rem; color: #718096; margin-bottom: 0.2rem; }
    .action-row { display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
    .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
    .dot-green { background: #25D366; }
    .dot-gray { background: #a0aec0; }
    .btn-xs { padding: 0.3rem 0.65rem; font-size: 0.82rem; }
    .toggle-btn { background: none; border: 2px solid #a0aec0; border-radius: 6px; padding: 0.25rem 0.55rem; cursor: pointer; font-size: 0.82rem; color: #4a5568; font-weight: 600; transition: all 0.12s; }
    .toggle-btn.active { border-color: #25D366; color: #25D366; }
    .toggle-btn:hover { opacity: 0.75; }
    .form-card { background: #f7fafc; border: 2px solid #25D366; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .form-card h2 { margin-bottom: 1.25rem; font-size: 1.15rem; color: #075e54; }
    select.input { height: auto; }
    .radio-group { display: flex; flex-direction: column; gap: 0.6rem; }
    .radio-option { display: flex; align-items: center; gap: 0.5rem; font-weight: 500; cursor: pointer; }
    .radio-option input[type=radio] { width: 1.1rem; height: 1.1rem; accent-color: #25D366; cursor: pointer; }
    .inline-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .inline-row label { margin: 0; font-weight: 400; color: #4a5568; }
    .inline-row input[type=number] { width: 70px; padding: 0.4rem 0.5rem; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 1rem; }
    .inline-row select { padding: 0.4rem 0.5rem; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 1rem; }
    .day-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.4rem 0; }
    .day-chip { padding: 0.35rem 0.65rem; border-radius: 20px; border: 2px solid #cbd5e0; background: #fff; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.12s; user-select: none; }
    .day-chip.selected { border-color: #25D366; background: #c6f6d5; color: #276749; }
    .form-footer { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .form-footer .btn { flex: 1; }
    .empty-state { text-align: center; color: #a0aec0; padding: 2rem 0; font-size: 0.95rem; }
    .time-row { display: flex; align-items: center; gap: 0.5rem; }
    .time-row input[type=number] { width: 65px; padding: 0.4rem 0.5rem; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 1rem; text-align: center; }
    .time-sep { font-weight: 700; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div x-data="schedulesApp()" x-init="init()">
    <nav class="navbar">
      <a href="/dashboard.html" class="navbar-brand">📅 WA Scheduler</a>
      <div class="navbar-right">
        <span x-text="user?.name"></span>
        <button class="btn btn-sm btn-secondary" @click="logout()">Switch User</button>
      </div>
    </nav>

    <main class="container" style="max-width:700px">
      <div class="nav-pills">
        <a href="/dashboard.html" class="nav-pill">🏠 Dashboard</a>
        <a href="/contacts.html" class="nav-pill">👥 Contacts</a>
        <a href="/templates.html" class="nav-pill">📝 Templates</a>
        <a href="/schedules.html" class="nav-pill active">⏰ Schedules</a>
        <a href="/history.html" class="nav-pill">📜 History</a>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h1 class="page-title" style="margin:0">⏰ Schedules</h1>
        <button class="btn" @click="showNewForm()" x-show="!showForm">+ New Schedule</button>
      </div>

      <!-- Schedule Form -->
      <div class="form-card" x-show="showForm" x-cloak>
        <h2 x-text="editingId ? 'Edit Schedule' : '+ New Schedule'"></h2>

        <div class="form-group">
          <label for="s-name">Schedule Name</label>
          <input id="s-name" class="input" type="text" placeholder="e.g. Morning Greeting to Dad" x-model="form.name">
        </div>

        <div class="form-group">
          <label for="s-template">Message Template</label>
          <select id="s-template" class="input" x-model="form.templateId">
            <option value="">— Choose a template —</option>
            <template x-for="t in templates" :key="t.id">
              <option :value="t.id" x-text="t.name"></option>
            </template>
          </select>
        </div>

        <div class="form-group">
          <label>Send To</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="recipientType" value="contact" x-model="form.recipientType">
              Contact
            </label>
            <div x-show="form.recipientType === 'contact'" style="padding-left:1.5rem">
              <select class="input" x-model="form.recipientId">
                <option value="">— Choose a contact —</option>
                <template x-for="c in contacts" :key="c.id">
                  <option :value="c.id" x-text="c.name + ' (' + c.phone + ')'"></option>
                </template>
              </select>
            </div>

            <label class="radio-option">
              <input type="radio" name="recipientType" value="group" x-model="form.recipientType">
              Group
            </label>
            <div x-show="form.recipientType === 'group'" style="padding-left:1.5rem">
              <select class="input" x-model="form.recipientId">
                <option value="">— Choose a group —</option>
                <template x-for="g in groups" :key="g.id">
                  <option :value="g.id" x-text="g.name"></option>
                </template>
              </select>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>When to Send</label>
          <div class="radio-group">
            <!-- Daily -->
            <label class="radio-option">
              <input type="radio" name="scheduleType" value="daily" x-model="form.scheduleType">
              Daily
            </label>
            <div x-show="form.scheduleType === 'daily'" style="padding-left:1.5rem">
              <div class="inline-row">
                <label>at</label>
                <div class="time-row">
                  <input type="number" min="0" max="23" placeholder="HH" x-model.number="form.timeHour">
                  <span class="time-sep">:</span>
                  <input type="number" min="0" max="59" placeholder="MM" x-model.number="form.timeMinute">
                </div>
                <label style="color:#718096">(24h format)</label>
              </div>
            </div>

            <!-- Weekly -->
            <label class="radio-option">
              <input type="radio" name="scheduleType" value="weekly" x-model="form.scheduleType">
              Weekly
            </label>
            <div x-show="form.scheduleType === 'weekly'" style="padding-left:1.5rem">
              <div class="day-chips">
                <template x-for="(dayName, idx) in ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']" :key="idx">
                  <span
                    class="day-chip"
                    :class="{selected: form.days.includes(idx)}"
                    @click="toggleDay(idx)"
                    x-text="dayName"
                  ></span>
                </template>
              </div>
              <div class="inline-row" style="margin-top:0.4rem">
                <label>at</label>
                <div class="time-row">
                  <input type="number" min="0" max="23" placeholder="HH" x-model.number="form.timeHour">
                  <span class="time-sep">:</span>
                  <input type="number" min="0" max="59" placeholder="MM" x-model.number="form.timeMinute">
                </div>
                <label style="color:#718096">(24h format)</label>
              </div>
            </div>

            <!-- Interval -->
            <label class="radio-option">
              <input type="radio" name="scheduleType" value="interval" x-model="form.scheduleType">
              Every N hours/days
            </label>
            <div x-show="form.scheduleType === 'interval'" style="padding-left:1.5rem">
              <div class="inline-row">
                <label>Every</label>
                <input type="number" min="1" step="1" x-model.number="form.intervalValue" style="width:70px">
                <select x-model="form.intervalUnit" style="padding:0.4rem 0.5rem;border:2px solid #cbd5e0;border-radius:8px;font-size:1rem">
                  <option value="hours">hours</option>
                  <option value="days">days</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="error-msg" x-show="formError" x-text="formError" style="text-align:left"></div>

        <div class="form-footer">
          <button class="btn" @click="saveSchedule()" :disabled="saving">
            <span class="spinner" x-show="saving"></span>
            <span x-text="saving ? 'Saving…' : 'Save Schedule'"></span>
          </button>
          <button class="btn btn-secondary" @click="cancelForm()">Cancel</button>
        </div>
      </div>

      <!-- Schedule List -->
      <template x-if="schedules.length === 0 && !showForm">
        <div class="empty-state">No schedules yet. Click <strong>+ New Schedule</strong> to create one!</div>
      </template>

      <template x-for="s in schedules" :key="s.id">
        <div class="card">
          <div class="sched-card">
            <div class="sched-info">
              <div class="sched-name">
                <span class="status-dot" :class="s.active ? 'dot-green' : 'dot-gray'" style="margin-right:6px;vertical-align:middle"></span>
                <span x-text="s.name"></span>
              </div>
              <div class="sched-meta">
                📝 <span x-text="s.template_name || 'Unknown template'"></span>
              </div>
              <div class="sched-meta">
                ⏰ <span x-text="describeSchedule(s)"></span>
              </div>
              <div class="sched-meta">
                👤 <span x-text="s.recipient_type === 'contact' ? 'Contact' : 'Group'"></span>
                <span x-show="s.last_run"> · Last run: <span x-text="formatTime(s.last_run)"></span></span>
              </div>
            </div>
            <div class="action-row">
              <button
                class="toggle-btn"
                :class="{active: s.active}"
                @click="toggleSchedule(s)"
                x-text="s.active ? '⏸ Pause' : '▶ Resume'"
              ></button>
              <button class="btn btn-sm btn-xs btn-secondary" @click="editSchedule(s)">✏️</button>
              <button class="btn btn-sm btn-xs btn-danger" @click="deleteSchedule(s.id)">🗑️</button>
            </div>
          </div>
        </div>
      </template>

      <div class="error-msg" x-show="error" x-text="error" style="margin-top:1rem"></div>
    </main>
  </div>

  <script>
    const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function schedulesApp() {
      return {
        user: null,
        schedules: [],
        templates: [],
        contacts: [],
        groups: [],
        showForm: false,
        editingId: null,
        saving: false,
        error: '',
        formError: '',
        form: {
          name: '',
          templateId: '',
          recipientType: 'contact',
          recipientId: '',
          scheduleType: 'daily',
          timeHour: 8,
          timeMinute: 0,
          days: [],
          intervalValue: 1,
          intervalUnit: 'hours',
        },

        async apiFetch(url, opts = {}) {
          const res = await fetch(url, { credentials: 'include', ...opts });
          if (res.status === 401) { window.location.href = '/'; return null; }
          return res;
        },

        async init() {
          const meRes = await this.apiFetch('/api/auth/me');
          if (!meRes) return;
          this.user = await meRes.json();
          await Promise.all([
            this.loadSchedules(),
            this.loadTemplates(),
            this.loadContacts(),
            this.loadGroups(),
          ]);
        },

        async loadSchedules() {
          const res = await this.apiFetch('/api/schedules');
          if (!res) return;
          this.schedules = await res.json();
        },

        async loadTemplates() {
          const res = await this.apiFetch('/api/templates');
          if (!res) return;
          this.templates = await res.json();
        },

        async loadContacts() {
          const res = await this.apiFetch('/api/contacts');
          if (!res) return;
          this.contacts = await res.json();
        },

        async loadGroups() {
          const res = await this.apiFetch('/api/groups');
          if (!res) return;
          this.groups = await res.json();
        },

        showNewForm() {
          this.editingId = null;
          this.form = {
            name: '',
            templateId: '',
            recipientType: 'contact',
            recipientId: '',
            scheduleType: 'daily',
            timeHour: 8,
            timeMinute: 0,
            days: [],
            intervalValue: 1,
            intervalUnit: 'hours',
          };
          this.formError = '';
          this.showForm = true;
        },

        editSchedule(s) {
          this.editingId = s.id;
          this.form = {
            name: s.name,
            templateId: String(s.template_id || ''),
            recipientType: s.recipient_type || 'contact',
            recipientId: String(s.recipient_id || ''),
            scheduleType: s.scheduleType || 'daily',
            timeHour: s.timeHour !== undefined ? s.timeHour : 8,
            timeMinute: s.timeMinute !== undefined ? s.timeMinute : 0,
            days: s.days ? [...s.days] : [],
            intervalValue: s.intervalValue || 1,
            intervalUnit: s.intervalUnit || 'hours',
          };
          this.formError = '';
          this.showForm = true;
          window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        cancelForm() {
          this.showForm = false;
          this.editingId = null;
          this.formError = '';
        },

        toggleDay(idx) {
          const pos = this.form.days.indexOf(idx);
          if (pos === -1) {
            this.form.days.push(idx);
          } else {
            this.form.days.splice(pos, 1);
          }
        },

        validateForm() {
          if (!this.form.name.trim()) { this.formError = 'Name is required.'; return false; }
          if (!this.form.templateId) { this.formError = 'Please choose a template.'; return false; }
          if (!this.form.recipientId) { this.formError = 'Please choose a recipient.'; return false; }
          if (!this.form.scheduleType) { this.formError = 'Please choose a schedule type.'; return false; }
          if ((this.form.scheduleType === 'daily' || this.form.scheduleType === 'weekly')) {
            const h = Number(this.form.timeHour);
            const m = Number(this.form.timeMinute);
            if (isNaN(h) || h < 0 || h > 23) { this.formError = 'Hour must be 0–23.'; return false; }
            if (isNaN(m) || m < 0 || m > 59) { this.formError = 'Minute must be 0–59.'; return false; }
          }
          if (this.form.scheduleType === 'weekly' && this.form.days.length === 0) {
            this.formError = 'Please select at least one day.';
            return false;
          }
          if (this.form.scheduleType === 'interval') {
            const v = Number(this.form.intervalValue);
            if (!Number.isInteger(v) || v < 1) { this.formError = 'Interval must be a whole number (1 or more).'; return false; }
          }
          return true;
        },

        async saveSchedule() {
          this.formError = '';
          if (!this.validateForm()) return;
          this.saving = true;
          const payload = {
            name: this.form.name.trim(),
            templateId: Number(this.form.templateId),
            recipientType: this.form.recipientType,
            recipientId: Number(this.form.recipientId),
            scheduleType: this.form.scheduleType,
            timeHour: Number(this.form.timeHour),
            timeMinute: Number(this.form.timeMinute),
            days: this.form.days,
            intervalValue: Number(this.form.intervalValue),
            intervalUnit: this.form.intervalUnit,
          };
          try {
            let res;
            if (this.editingId) {
              res = await this.apiFetch(`/api/schedules/${this.editingId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });
            } else {
              res = await this.apiFetch('/api/schedules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });
            }
            if (!res) return;
            if (!res.ok) {
              const d = await res.json();
              this.formError = d.error || 'Save failed.';
              return;
            }
            await this.loadSchedules();
            this.cancelForm();
          } catch (e) {
            this.formError = 'Network error.';
          } finally {
            this.saving = false;
          }
        },

        async toggleSchedule(s) {
          const res = await this.apiFetch(`/api/schedules/${s.id}/toggle`, { method: 'PATCH' });
          if (res) await this.loadSchedules();
        },

        async deleteSchedule(id) {
          if (!confirm('Delete this schedule?')) return;
          const res = await this.apiFetch(`/api/schedules/${id}`, { method: 'DELETE' });
          if (res) await this.loadSchedules();
        },

        describeSchedule(s) {
          const pad = n => String(n).padStart(2, '0');
          if (s.scheduleType === 'daily') {
            return `Daily at ${pad(s.timeHour)}:${pad(s.timeMinute)}`;
          }
          if (s.scheduleType === 'weekly') {
            const dayNames = (s.days || []).map(d => DAY_SHORT[d]).join(', ');
            return `Every ${dayNames} at ${pad(s.timeHour)}:${pad(s.timeMinute)}`;
          }
          if (s.scheduleType === 'interval') {
            return `Every ${s.intervalValue} ${s.intervalUnit}`;
          }
          return s.cron_expr || '—';
        },

        formatTime(iso) {
          if (!iso) return '—';
          return new Date(iso).toLocaleString();
        },

        async logout() {
          await this.apiFetch('/api/auth/logout', { method: 'POST' });
          window.location.href = '/';
        },
      };
    }
  </script>
</body>
</html>
