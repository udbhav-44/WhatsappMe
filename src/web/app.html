<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ping — Scheduled Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app.css">
  <script defer src="https://unpkg.com/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()" x-cloak @keydown.escape="closeAll()">

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="wordmark">Ping<span class="mark-dot">.</span></div>
    <div class="topbar-right">
      <div class="status-pill" @click="openConnection()">
        <span class="dot" :class="wa.connected ? 'dot-live' : 'dot-off'"></span>
        <span x-text="wa.connected ? 'Connected' : 'Not connected'"></span>
      </div>
      <span class="who" x-text="user?.name"></span>
      <button class="icon-btn" @click="menuOpen = !menuOpen" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
      </button>
    </div>
  </header>

  <!-- menu popover -->
  <div class="menu-pop" x-show="menuOpen" @click.outside="menuOpen=false" x-transition x-cloak>
    <button @click="openContacts(); menuOpen=false">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>
      People &amp; groups
    </button>
    <button @click="openHistory(); menuOpen=false">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Message history
    </button>
    <div class="divider"></div>
    <button @click="openConnection(); menuOpen=false">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.5a7 7 0 0 1 14 0"/><path d="M8.5 16a3.5 3.5 0 0 1 7 0"/><circle cx="12" cy="19" r="1"/></svg>
      WhatsApp connection
    </button>
    <button @click="window.location.href='/'">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
      Switch person
    </button>
    <button class="danger" @click="logout()">Sign out</button>
  </div>

  <!-- ============ MAIN ============ -->
  <main class="shell">

    <!-- connection banner (only when disconnected) -->
    <div class="banner enter" x-show="!wa.connected && !postConnect" x-cloak>
      <div class="b-body">
        <div class="b-title">WhatsApp isn't connected</div>
        <div class="b-sub">Messages won't send until you connect. Tap to scan the code.</div>
      </div>
      <button class="btn btn-sm" @click="openConnection()">Connect</button>
    </div>

    <!-- just-connected: offer to import contacts -->
    <div class="banner enter" x-show="postConnect" x-cloak>
      <div class="b-body">
        <div class="b-title">Connected. Bring in your contacts?</div>
        <div class="b-sub">Import people straight from WhatsApp so you don't have to add them by hand.</div>
      </div>
      <button class="btn btn-sm" @click="importFromPrompt()">Import contacts</button>
      <button class="btn btn-quiet btn-sm" @click="postConnect=false">Later</button>
    </div>

    <div class="page-head enter">
      <div>
        <h1>Scheduled messages</h1>
        <div class="sub" x-text="schedules.length ? (schedules.length + ' set up') : 'Nothing scheduled yet'"></div>
      </div>
      <button class="btn" @click="openComposer()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
        New message
      </button>
    </div>

    <!-- empty -->
    <template x-if="loaded && schedules.length === 0">
      <div class="empty enter">
        <h3>No scheduled messages yet</h3>
        <p>Set up a message once and it sends itself — every morning, every week, however you like.</p>
        <button class="btn" @click="openComposer()">Create your first one</button>
      </div>
    </template>

    <!-- schedule list -->
    <template x-for="(s, i) in schedules" :key="s.id">
      <div class="sched enter" :class="{ paused: !s.active }" :style="`animation-delay:${i*40}ms`">
        <label class="switch" @click.stop>
          <input type="checkbox" :checked="s.active" @change="toggleSchedule(s)">
          <span class="track"></span>
        </label>
        <div class="sched-body" @click="openComposer(s)" style="cursor:pointer">
          <div class="sched-name" x-text="s.name"></div>
          <div class="sched-meta">
            <span class="to" x-text="recipientLabel(s)"></span>
            <span class="sched-when" x-text="describe(s)"></span>
          </div>
        </div>
        <div class="sched-actions">
          <button class="icon-btn" @click="openComposer(s)" aria-label="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
          <button class="icon-btn danger" @click="deleteSchedule(s)" aria-label="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          </button>
        </div>
      </div>
    </template>
  </main>

  <!-- ============ COMPOSER DRAWER ============ -->
  <template x-if="composer.open">
    <div>
      <div class="overlay" @click="closeComposer()"></div>
      <div class="drawer">
        <div class="drawer-head">
          <h2 x-text="composer.editingId ? 'Edit message' : 'New message'"></h2>
          <button class="icon-btn" @click="closeComposer()"><span class="close-x">&times;</span></button>
        </div>
        <div class="drawer-body">
          <div class="form-err" x-show="composer.err" x-text="composer.err"></div>

          <!-- name -->
          <div class="field">
            <label>Give it a name</label>
            <input class="input" type="text" x-model="form.name" placeholder="e.g. Good morning to Dad">
          </div>

          <!-- message -->
          <div class="field">
            <label>Message</label>
            <textarea class="textarea" x-ref="body" x-model="form.body"
              placeholder="Type your message. Tap a tag below to personalise it."></textarea>
            <div class="chips">
              <span class="chip" @click="insertVar('{{name}}')">Name</span>
              <span class="chip" @click="insertVar('{{date}}')">Date</span>
              <span class="chip" @click="insertVar('{{day}}')">Day</span>
              <span class="chip" @click="insertVar('{{time}}')">Time</span>
            </div>
            <div class="preview" :class="{ muted: !form.body }" x-text="previewText()"></div>
          </div>

          <!-- recipient -->
          <div class="field">
            <label>Send to</label>
            <div class="seg" style="margin-bottom:.6rem">
              <button :class="{ on: form.recipientType==='contact' }" @click="form.recipientType='contact'; form.recipientId=''">One person</button>
              <button :class="{ on: form.recipientType==='group' }" @click="form.recipientType='group'; form.recipientId=''">A group</button>
            </div>
            <template x-if="form.recipientType==='contact'">
              <select class="input" x-model="form.recipientId">
                <option value="">Choose a person…</option>
                <template x-for="c in contacts" :key="c.id">
                  <option :value="c.id" x-text="c.name + '  ·  ' + c.phone"></option>
                </template>
              </select>
            </template>
            <template x-if="form.recipientType==='group'">
              <select class="input" x-model="form.recipientId">
                <option value="">Choose a group…</option>
                <template x-for="g in groups" :key="g.id">
                  <option :value="g.id" x-text="g.name"></option>
                </template>
              </select>
            </template>

            <!-- inline add contact -->
            <template x-if="form.recipientType==='contact'">
              <div style="margin-top:.6rem">
                <button class="btn btn-quiet btn-sm" x-show="!addingContact" @click="addingContact=true" style="padding-left:0">+ Add a new person</button>
                <div class="card" style="padding:.9rem;margin-top:.4rem" x-show="addingContact" x-cloak>
                  <div class="field" style="margin-bottom:.7rem">
                    <label>Name</label>
                    <input class="input" type="text" x-model="newContact.name" placeholder="e.g. Ravi">
                  </div>
                  <div class="field" style="margin-bottom:.7rem">
                    <label>Phone</label>
                    <div class="phone-group">
                      <span class="cc">+91</span>
                      <input class="input" type="tel" x-model="newContact.phone" placeholder="9876543210">
                    </div>
                    <div class="hint">Enter a 10-digit Indian number. For other countries, type the full number with country code and a leading +.</div>
                  </div>
                  <div class="err" x-show="newContact.err" x-text="newContact.err"></div>
                  <div style="display:flex;gap:.5rem">
                    <button class="btn btn-ghost btn-sm" @click="addingContact=false; newContact={name:'',phone:'',err:''}">Cancel</button>
                    <button class="btn btn-sm" @click="saveInlineContact()">Save person</button>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <!-- timing -->
          <div class="field">
            <label>When to send</label>
            <div class="seg" style="margin-bottom:.7rem">
              <button :class="{ on: form.scheduleType==='daily' }" @click="form.scheduleType='daily'">Every day</button>
              <button :class="{ on: form.scheduleType==='weekly' }" @click="form.scheduleType='weekly'">Weekly</button>
              <button :class="{ on: form.scheduleType==='interval' }" @click="form.scheduleType='interval'">Repeat</button>
            </div>

            <!-- daily / weekly time -->
            <template x-if="form.scheduleType==='daily' || form.scheduleType==='weekly'">
              <div>
                <template x-if="form.scheduleType==='weekly'">
                  <div class="chips" style="margin:0 0 .8rem">
                    <template x-for="(d, idx) in dayNames" :key="idx">
                      <span class="chip" :class="{ on: form.days.includes(idx) }" @click="toggleDay(idx)" x-text="d"></span>
                    </template>
                  </div>
                </template>
                <div class="time-row">
                  <span style="color:var(--ink-soft);font-weight:600">at</span>
                  <input class="input" type="number" min="0" max="23" x-model.number="form.timeHour">
                  <span class="time-sep">:</span>
                  <input class="input" type="number" min="0" max="59" x-model.number="form.timeMinute">
                  <span class="hint" style="margin:0" x-text="timeLabel()"></span>
                </div>
              </div>
            </template>

            <!-- interval -->
            <template x-if="form.scheduleType==='interval'">
              <div class="inline-row">
                <span style="color:var(--ink-soft);font-weight:600">Every</span>
                <input class="input" type="number" min="1" step="1" x-model.number="form.intervalValue">
                <select class="input" x-model="form.intervalUnit">
                  <option value="hours">hours</option>
                  <option value="days">days</option>
                </select>
              </div>
            </template>
          </div>
        </div>
        <div class="drawer-foot">
          <button class="btn btn-ghost btn-block" @click="closeComposer()">Cancel</button>
          <button class="btn btn-block" @click="saveComposer()" :disabled="composer.saving">
            <span x-show="composer.saving" class="spinner"></span>
            <span x-text="composer.saving ? 'Saving…' : (composer.editingId ? 'Save changes' : 'Schedule it')"></span>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============ CONTACTS DRAWER ============ -->
  <template x-if="contactsView.open">
    <div>
      <div class="overlay" @click="contactsView.open=false"></div>
      <div class="drawer">
        <div class="drawer-head">
          <h2 x-text="contactsView.mode==='import' ? 'Import from WhatsApp' : 'People &amp; groups'"></h2>
          <button class="icon-btn" @click="contactsView.open=false"><span class="close-x">&times;</span></button>
        </div>

        <!-- manage mode -->
        <template x-if="contactsView.mode==='manage'">
          <div class="drawer-body">
            <div class="toolbar">
              <input class="search" placeholder="Search people…" x-model="contactsView.search">
              <button class="btn btn-ghost btn-sm" @click="startImport()">Import</button>
            </div>

            <!-- add person -->
            <button class="btn btn-quiet btn-sm" style="padding-left:0;margin-bottom:.4rem" x-show="!contactsView.adding" @click="contactsView.adding=true">+ Add a person</button>
            <div class="card" style="padding:.9rem;margin-bottom:1rem" x-show="contactsView.adding" x-cloak>
              <div class="field" style="margin-bottom:.7rem">
                <label>Name</label>
                <input class="input" type="text" x-model="contactsView.form.name" placeholder="e.g. Ravi">
              </div>
              <div class="field" style="margin-bottom:.7rem">
                <label>Phone</label>
                <div class="phone-group">
                  <span class="cc">+91</span>
                  <input class="input" type="tel" x-model="contactsView.form.phone" placeholder="9876543210">
                </div>
              </div>
              <div class="err" x-show="contactsView.err" x-text="contactsView.err"></div>
              <div style="display:flex;gap:.5rem">
                <button class="btn btn-ghost btn-sm" @click="contactsView.adding=false; contactsView.form={name:'',phone:''}; contactsView.err=''">Cancel</button>
                <button class="btn btn-sm" @click="saveContact()">Save</button>
              </div>
            </div>

            <template x-if="filteredContacts().length === 0">
              <div class="empty" style="padding:2rem 1rem"><p style="margin:0">No people yet. Add one, or import from WhatsApp.</p></div>
            </template>

            <template x-for="c in filteredContacts()" :key="c.id">
              <div class="row">
                <div class="avatar" x-text="c.name.charAt(0).toUpperCase()"></div>
                <div class="row-body">
                  <div class="row-name" x-text="c.name"></div>
                  <div class="row-sub" x-text="c.phone"></div>
                </div>
                <button class="icon-btn danger" @click="deleteContact(c)" aria-label="Delete">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                </button>
              </div>
            </template>

            <!-- groups -->
            <h3 style="font-size:1.1rem;margin:1.6rem 0 .6rem">Groups</h3>
            <div class="toolbar">
              <input class="search" placeholder="New group name…" x-model="contactsView.newGroup" @keydown.enter="createGroup()">
              <button class="btn btn-sm" @click="createGroup()">Create</button>
            </div>
            <template x-for="g in groups" :key="g.id">
              <div>
                <div class="row">
                  <div class="row-body">
                    <div class="row-name" x-text="g.name"></div>
                    <div class="row-sub"><span x-text="(g.member_count||0)"></span> members</div>
                  </div>
                  <button class="btn btn-quiet btn-sm" @click="toggleGroup(g)" x-text="contactsView.openGroup===g.id ? 'Done' : 'Manage'"></button>
                  <button class="icon-btn danger" @click="deleteGroup(g)" aria-label="Delete">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                  </button>
                </div>
                <div x-show="contactsView.openGroup===g.id" style="padding:.4rem 0 1rem 1rem" x-cloak>
                  <div class="inline-row" style="margin-bottom:.6rem">
                    <select class="input" x-model="contactsView.addMemberId">
                      <option value="">Add a person…</option>
                      <template x-for="c in nonMembers(g)" :key="c.id">
                        <option :value="c.id" x-text="c.name"></option>
                      </template>
                    </select>
                    <button class="btn btn-sm" @click="addMember(g)">Add</button>
                  </div>
                  <template x-for="m in (g.members||[])" :key="m.id">
                    <div class="row" style="padding:.4rem .2rem">
                      <div class="row-body"><span x-text="m.name"></span> <span class="row-sub" x-text="m.phone"></span></div>
                      <button class="btn btn-quiet btn-sm" @click="removeMember(g, m)">Remove</button>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- import mode -->
        <template x-if="contactsView.mode==='import'">
          <div class="drawer-body">
            <template x-if="importer.loading">
              <div style="text-align:center;padding:2rem"><span class="spinner dark"></span><div class="hint" style="margin-top:.8rem" x-text="importer.status"></div></div>
            </template>
            <template x-if="!importer.loading && importer.list.length===0">
              <div style="text-align:center;padding:1.5rem">
                <p class="hint">No contacts loaded. Reconnect and sync your full WhatsApp list (about 10 seconds).</p>
                <button class="btn" style="margin-top:.8rem" @click="syncContacts()" :disabled="importer.syncing">
                  <span x-show="importer.syncing" class="spinner"></span>
                  <span x-text="importer.syncing ? 'Syncing…' : 'Sync from WhatsApp'"></span>
                </button>
              </div>
            </template>
            <template x-if="!importer.loading && importer.list.length>0">
              <div>
                <div class="toolbar">
                  <input class="search" placeholder="Search…" x-model="importer.search">
                  <button class="btn btn-ghost btn-sm" @click="toggleImportAll()">Select all</button>
                </div>
                <div class="hint" style="margin-bottom:.5rem" x-text="importList().length + ' new contacts'"></div>
                <template x-for="c in importList()" :key="c.phone">
                  <label class="check-row">
                    <input type="checkbox" :checked="importer.sel[c.phone]" @change="importer.sel[c.phone]=$event.target.checked">
                    <div class="row-body"><div class="row-name" x-text="c.name"></div><div class="row-sub" x-text="c.phone"></div></div>
                  </label>
                </template>
              </div>
            </template>
            <div class="err" x-show="importer.msg" x-text="importer.msg" style="text-align:center"></div>
          </div>
        </template>

        <div class="drawer-foot" x-show="contactsView.mode==='import'">
          <button class="btn btn-ghost btn-block" @click="contactsView.mode='manage'">Back</button>
          <button class="btn btn-block" @click="doImport()" :disabled="importCount()===0"
            x-text="importCount() ? ('Import ' + importCount()) : 'Import'"></button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============ HISTORY DRAWER ============ -->
  <template x-if="historyView.open">
    <div>
      <div class="overlay" @click="historyView.open=false"></div>
      <div class="drawer">
        <div class="drawer-head">
          <h2>Message history</h2>
          <button class="icon-btn" @click="historyView.open=false"><span class="close-x">&times;</span></button>
        </div>
        <div class="drawer-body">
          <div class="seg" style="margin-bottom:1rem">
            <button :class="{on: historyView.status===''}" @click="historyView.status=''; loadLogs()">All</button>
            <button :class="{on: historyView.status==='sent'}" @click="historyView.status='sent'; loadLogs()">Sent</button>
            <button :class="{on: historyView.status==='failed'}" @click="historyView.status='failed'; loadLogs()">Failed</button>
            <button :class="{on: historyView.status==='missed'}" @click="historyView.status='missed'; loadLogs()">Missed</button>
          </div>
          <template x-if="historyView.logs.length===0">
            <div class="empty" style="padding:2rem 1rem"><p style="margin:0">Nothing here yet.</p></div>
          </template>
          <template x-for="log in historyView.logs" :key="log.id">
            <div class="row">
              <div class="row-body">
                <div class="row-name" x-text="log.phone"></div>
                <div class="row-sub" x-text="(log.message_body||'').slice(0,60)"></div>
                <div class="row-sub" style="margin-top:.15rem" x-text="fmtTime(log.sent_at)"></div>
              </div>
              <span class="badge" :class="'badge-'+log.status" x-text="log.status"></span>
            </div>
          </template>
          <div style="display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:1rem" x-show="historyView.pages>1">
            <button class="btn btn-ghost btn-sm" @click="goPage(-1)" :disabled="historyView.page<=1">Prev</button>
            <span class="hint" x-text="'Page '+historyView.page+' of '+historyView.pages"></span>
            <button class="btn btn-ghost btn-sm" @click="goPage(1)" :disabled="historyView.page>=historyView.pages">Next</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ============ CONNECTION DRAWER ============ -->
  <template x-if="connView.open">
    <div>
      <div class="overlay" @click="connView.open=false"></div>
      <div class="drawer">
        <div class="drawer-head">
          <h2>WhatsApp connection</h2>
          <button class="icon-btn" @click="connView.open=false"><span class="close-x">&times;</span></button>
        </div>
        <div class="drawer-body">
          <div class="row" style="border:none">
            <span class="dot" :class="wa.connected ? 'dot-live' : 'dot-off'"></span>
            <div class="row-body"><div class="row-name" x-text="wa.connected ? 'Connected' : 'Not connected'"></div>
              <div class="row-sub" x-text="wa.connected ? 'Ready to send messages.' : 'Scan the code below with WhatsApp.'"></div>
            </div>
          </div>

          <div class="qr-wrap" x-show="!wa.connected && wa.qr" x-cloak>
            <p>On your phone: WhatsApp &rarr; Settings &rarr; Linked Devices &rarr; Link a Device</p>
            <img :src="wa.qr" alt="QR code">
          </div>

          <div style="text-align:center;padding:1rem" x-show="!wa.connected && !wa.qr && connView.working">
            <span class="spinner dark"></span>
            <div class="hint" style="margin-top:.8rem">Preparing connection…</div>
          </div>

          <div style="display:flex;gap:.6rem;margin-top:1.2rem">
            <button class="btn btn-block" x-show="!wa.connected" @click="reconnect()" :disabled="connView.working">
              <span x-text="connView.working ? 'Working…' : 'Connect / Refresh code'"></span>
            </button>
            <button class="btn btn-danger btn-block" x-show="wa.connected" @click="disconnect()">Disconnect WhatsApp</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <div class="toast" x-show="toast" x-text="toast" x-transition x-cloak></div>

  <script>
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function app() {
      return {
        user: null,
        loaded: false,
        menuOpen: false,
        toast: '',
        wa: { connected: false, qr: null },
        postConnect: false,
        _statusInit: false,
        schedules: [],
        templates: [],
        contacts: [],
        groups: [],
        dayNames: DAY_NAMES,

        composer: { open: false, editingId: null, templateId: null, saving: false, err: '' },
        form: blankForm(),
        addingContact: false,
        newContact: { name: '', phone: '', err: '' },

        contactsView: { open: false, mode: 'manage', search: '', adding: false, form: { name: '', phone: '' }, err: '', newGroup: '', openGroup: null, addMemberId: '' },
        importer: { loading: false, syncing: false, list: [], sel: {}, search: '', status: '', msg: '' },
        historyView: { open: false, logs: [], status: '', page: 1, pages: 1 },
        connView: { open: false, working: false },

        _waTimer: null,

        // ---------- lifecycle ----------
        async apiFetch(url, opts = {}) {
          const res = await fetch(url, { credentials: 'include', ...opts });
          if (res.status === 401) { window.location.href = '/'; return null; }
          return res;
        },
        async init() {
          const me = await this.apiFetch('/api/auth/me');
          if (!me) return;
          this.user = await me.json();
          await this.reloadAll();
          this.loaded = true;
          await this.loadStatus();
          this._waTimer = setInterval(() => this.loadStatus(), 20000);
        },
        async reloadAll() {
          await Promise.all([this.loadSchedules(), this.loadTemplates(), this.loadContacts(), this.loadGroups()]);
        },
        async loadSchedules() { const r = await this.apiFetch('/api/schedules'); if (r) this.schedules = await r.json(); },
        async loadTemplates() { const r = await this.apiFetch('/api/templates'); if (r) this.templates = await r.json(); },
        async loadContacts() { const r = await this.apiFetch('/api/contacts'); if (r) this.contacts = await r.json(); },
        async loadGroups() {
          const r = await this.apiFetch('/api/groups'); if (!r) return;
          this.groups = await r.json();
          await Promise.all(this.groups.map(g => this.loadMembers(g)));
        },
        async loadMembers(g) {
          const r = await this.apiFetch(`/api/groups/${g.id}/members`); if (!r) return;
          g.members = await r.json(); g.member_count = g.members.length;
          this.groups = [...this.groups];
        },
        closeAll() { this.menuOpen = false; this.composer.open = false; this.contactsView.open = false; this.historyView.open = false; this.connView.open = false; },
        flash(msg) { this.toast = msg; setTimeout(() => this.toast = '', 2200); },

        // ---------- schedule list helpers ----------
        recipientLabel(s) {
          if (s.recipient_type === 'group') {
            const g = this.groups.find(x => x.id === s.recipient_id);
            return g ? g.name : 'Group';
          }
          const c = this.contacts.find(x => x.id === s.recipient_id);
          return c ? c.name : 'Someone';
        },
        describe(s) {
          const pad = n => String(n).padStart(2, '0');
          if (s.scheduleType === 'daily') return `every day at ${pad(s.timeHour)}:${pad(s.timeMinute)}`;
          if (s.scheduleType === 'weekly') return `${(s.days||[]).map(d => DAY_NAMES[d]).join(', ')} at ${pad(s.timeHour)}:${pad(s.timeMinute)}`;
          if (s.scheduleType === 'interval') return `every ${s.intervalValue} ${s.intervalUnit}`;
          return '';
        },
        fmtTime(ts) { return ts ? new Date(ts * 1000).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }) : '—'; },

        // ---------- composer ----------
        openComposer(s = null) {
          this.addingContact = false;
          this.newContact = { name: '', phone: '', err: '' };
          if (s) {
            const tpl = this.templates.find(t => t.id === s.template_id);
            this.composer = { open: true, editingId: s.id, templateId: s.template_id, saving: false, err: '' };
            this.form = {
              name: s.name,
              body: tpl ? tpl.body : '',
              recipientType: s.recipient_type || 'contact',
              recipientId: String(s.recipient_id || ''),
              scheduleType: s.scheduleType || 'daily',
              timeHour: s.timeHour ?? 8,
              timeMinute: s.timeMinute ?? 0,
              days: s.days ? [...s.days] : [],
              intervalValue: s.intervalValue || 1,
              intervalUnit: s.intervalUnit || 'hours',
            };
          } else {
            this.composer = { open: true, editingId: null, templateId: null, saving: false, err: '' };
            this.form = blankForm();
          }
        },
        closeComposer() { this.composer.open = false; },
        insertVar(v) {
          const ta = this.$refs.body;
          if (!ta) { this.form.body += v; return; }
          const s = ta.selectionStart, e = ta.selectionEnd;
          this.form.body = this.form.body.slice(0, s) + v + this.form.body.slice(e);
          this.$nextTick(() => { ta.focus(); ta.setSelectionRange(s + v.length, s + v.length); });
        },
        previewText() {
          if (!this.form.body) return 'Your message preview shows here…';
          const now = new Date();
          const c = this.contacts.find(x => String(x.id) === String(this.form.recipientId));
          return this.form.body
            .replace(/\{\{name\}\}/g, c ? c.name : 'Ravi')
            .replace(/\{\{date\}\}/g, now.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' }))
            .replace(/\{\{day\}\}/g, ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()])
            .replace(/\{\{time\}\}/g, now.toLocaleTimeString('en-IN', { hour: 'numeric', minute: '2-digit' }));
        },
        timeLabel() {
          const h = Number(this.form.timeHour), m = Number(this.form.timeMinute);
          if (isNaN(h) || isNaN(m)) return '';
          const ap = h >= 12 ? 'PM' : 'AM'; const h12 = h % 12 || 12;
          return `${h12}:${String(m).padStart(2,'0')} ${ap}`;
        },
        toggleDay(idx) {
          const p = this.form.days.indexOf(idx);
          if (p === -1) this.form.days.push(idx); else this.form.days.splice(p, 1);
        },
        async saveInlineContact() {
          const phone = normPhone(this.newContact.phone);
          if (!this.newContact.name.trim()) { this.newContact.err = 'Enter a name.'; return; }
          if (!phone) { this.newContact.err = 'Enter a valid phone number.'; return; }
          const r = await this.apiFetch('/api/contacts', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: this.newContact.name.trim(), phone }),
          });
          if (!r) return;
          if (!r.ok) { const d = await r.json(); this.newContact.err = d.error || 'Could not save.'; return; }
          const c = await r.json();
          await this.loadContacts();
          this.form.recipientId = String(c.id);
          this.addingContact = false;
          this.newContact = { name: '', phone: '', err: '' };
        },
        validateComposer() {
          const f = this.form;
          if (!f.name.trim()) return 'Give the message a name.';
          if (!f.body.trim()) return 'Write a message.';
          if (!f.recipientId) return 'Choose who to send to.';
          if (f.scheduleType === 'daily' || f.scheduleType === 'weekly') {
            const h = Number(f.timeHour), m = Number(f.timeMinute);
            if (isNaN(h) || h < 0 || h > 23) return 'Hour must be between 0 and 23.';
            if (isNaN(m) || m < 0 || m > 59) return 'Minute must be between 0 and 59.';
          }
          if (f.scheduleType === 'weekly' && f.days.length === 0) return 'Pick at least one day.';
          if (f.scheduleType === 'interval') {
            const v = Number(f.intervalValue);
            if (!Number.isInteger(v) || v < 1) return 'Repeat value must be a whole number.';
          }
          return null;
        },
        async saveComposer() {
          const err = this.validateComposer();
          if (err) { this.composer.err = err; return; }
          this.composer.err = ''; this.composer.saving = true;
          try {
            const tplBody = { name: this.form.name.trim() + ' — message', body: this.form.body };
            // upsert template (hidden from user)
            let tplId = this.composer.templateId, tRes = null;
            if (tplId) {
              tRes = await this.apiFetch(`/api/templates/${tplId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(tplBody) });
              if (tRes && !tRes.ok) tRes = null;
            }
            if (!tplId || !tRes) {
              tRes = await this.apiFetch('/api/templates', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(tplBody) });
            }
            if (!tRes || !tRes.ok) { this.composer.err = 'Could not save the message.'; return; }
            tplId = (await tRes.json()).id;

            const payload = {
              name: this.form.name.trim(), templateId: tplId,
              recipientType: this.form.recipientType, recipientId: Number(this.form.recipientId),
              scheduleType: this.form.scheduleType,
              timeHour: Number(this.form.timeHour), timeMinute: Number(this.form.timeMinute),
              days: this.form.days, intervalValue: Number(this.form.intervalValue), intervalUnit: this.form.intervalUnit,
            };
            const url = this.composer.editingId ? `/api/schedules/${this.composer.editingId}` : '/api/schedules';
            const method = this.composer.editingId ? 'PUT' : 'POST';
            const sRes = await this.apiFetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!sRes) return;
            if (!sRes.ok) { const d = await sRes.json(); this.composer.err = d.error || 'Could not schedule.'; return; }
            await this.loadSchedules(); await this.loadTemplates();
            this.composer.open = false;
            this.flash(this.composer.editingId ? 'Message updated' : 'Message scheduled');
          } catch (e) { this.composer.err = 'Network error.'; }
          finally { this.composer.saving = false; }
        },
        async toggleSchedule(s) { const r = await this.apiFetch(`/api/schedules/${s.id}/toggle`, { method: 'PATCH' }); if (r) await this.loadSchedules(); },
        async deleteSchedule(s) {
          if (!confirm(`Delete "${s.name}"?`)) return;
          const r = await this.apiFetch(`/api/schedules/${s.id}`, { method: 'DELETE' });
          if (r) { await this.loadSchedules(); this.flash('Deleted'); }
        },

        // ---------- contacts drawer ----------
        openContacts() { this.contactsView.open = true; this.contactsView.mode = 'manage'; },
        filteredContacts() {
          const q = this.contactsView.search.toLowerCase();
          if (!q) return this.contacts;
          return this.contacts.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q));
        },
        async saveContact() {
          const phone = normPhone(this.contactsView.form.phone);
          if (!this.contactsView.form.name.trim()) { this.contactsView.err = 'Enter a name.'; return; }
          if (!phone) { this.contactsView.err = 'Enter a valid phone number.'; return; }
          const r = await this.apiFetch('/api/contacts', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: this.contactsView.form.name.trim(), phone }),
          });
          if (!r) return;
          if (!r.ok) { const d = await r.json(); this.contactsView.err = d.error || 'Could not save.'; return; }
          await this.loadContacts();
          this.contactsView.adding = false; this.contactsView.form = { name: '', phone: '' }; this.contactsView.err = '';
        },
        async deleteContact(c) {
          if (!confirm(`Remove ${c.name}?`)) return;
          const r = await this.apiFetch(`/api/contacts/${c.id}`, { method: 'DELETE' });
          if (r) await this.loadContacts();
        },
        async createGroup() {
          const name = this.contactsView.newGroup.trim(); if (!name) return;
          const r = await this.apiFetch('/api/groups', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
          if (r && r.ok) { this.contactsView.newGroup = ''; await this.loadGroups(); }
        },
        async deleteGroup(g) {
          if (!confirm(`Delete group "${g.name}"?`)) return;
          const r = await this.apiFetch(`/api/groups/${g.id}`, { method: 'DELETE' });
          if (r) await this.loadGroups();
        },
        toggleGroup(g) { this.contactsView.openGroup = this.contactsView.openGroup === g.id ? null : g.id; this.contactsView.addMemberId = ''; },
        nonMembers(g) { const ids = (g.members || []).map(m => m.id); return this.contacts.filter(c => !ids.includes(c.id)); },
        async addMember(g) {
          if (!this.contactsView.addMemberId) return;
          const r = await this.apiFetch(`/api/groups/${g.id}/members`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contactId: Number(this.contactsView.addMemberId) }) });
          if (r) { this.contactsView.addMemberId = ''; await this.loadGroups(); }
        },
        async removeMember(g, m) {
          const r = await this.apiFetch(`/api/groups/${g.id}/members/${m.id}`, { method: 'DELETE' });
          if (r) await this.loadGroups();
        },

        // ---------- import ----------
        async startImport() {
          this.contactsView.mode = 'import';
          this.importer = { loading: true, syncing: false, list: [], sel: {}, search: '', status: 'Loading…', msg: '' };
          const r = await this.apiFetch('/api/whatsapp/contacts');
          this.importer.loading = false;
          if (!r) return;
          const all = await r.json();
          const have = new Set(this.contacts.map(c => c.phone));
          this.importer.list = all.filter(c => !have.has(c.phone));
        },
        async syncContacts() {
          this.importer.syncing = true;
          await this.apiFetch('/api/whatsapp/sync-contacts', { method: 'POST' });
          for (let i = 0; i < 15; i++) {
            await new Promise(r => setTimeout(r, 2000));
            const r = await this.apiFetch('/api/whatsapp/contacts');
            if (!r) break;
            const all = await r.json();
            if (all.length > 0) {
              const have = new Set(this.contacts.map(c => c.phone));
              this.importer.list = all.filter(c => !have.has(c.phone));
              break;
            }
          }
          this.importer.syncing = false;
        },
        importList() {
          const q = this.importer.search.toLowerCase();
          if (!q) return this.importer.list;
          return this.importer.list.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q));
        },
        toggleImportAll() {
          const vis = this.importList();
          const all = vis.every(c => this.importer.sel[c.phone]);
          vis.forEach(c => this.importer.sel[c.phone] = !all);
        },
        importCount() { return this.importer.list.filter(c => this.importer.sel[c.phone]).length; },
        async doImport() {
          const chosen = this.importer.list.filter(c => this.importer.sel[c.phone]);
          if (!chosen.length) return;
          this.importer.msg = `Importing ${chosen.length}…`;
          const r = await this.apiFetch('/api/contacts/batch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contacts: chosen }) });
          if (!r) return;
          const d = await r.json();
          await this.loadContacts();
          this.contactsView.mode = 'manage';
          this.flash(`Imported ${d.imported} contacts`);
        },

        // ---------- history ----------
        openHistory() { this.historyView.open = true; this.historyView.page = 1; this.loadLogs(); },
        async loadLogs() {
          const p = new URLSearchParams({ page: this.historyView.page, limit: 30 });
          if (this.historyView.status) p.set('status', this.historyView.status);
          const r = await this.apiFetch('/api/logs?' + p.toString());
          if (!r) return;
          const d = await r.json();
          this.historyView.logs = d.logs || [];
          this.historyView.pages = d.pages || 1;
        },
        goPage(delta) { this.historyView.page = Math.max(1, this.historyView.page + delta); this.loadLogs(); },

        // ---------- connection ----------
        openConnection() { this.connView.open = true; this.loadStatus(); if (!this.wa.connected) this.reconnect(); },
        async loadStatus() {
          const r = await this.apiFetch('/api/whatsapp/status');
          if (!r) return;
          const wasConnected = this.wa.connected;
          this.wa = await r.json();
          // Offer contact import right after a fresh connection (not on page load)
          if (this._statusInit && !wasConnected && this.wa.connected) {
            this.connView.open = false;
            this.postConnect = true;
          }
          this._statusInit = true;
        },
        async importFromPrompt() {
          this.postConnect = false;
          this.openContacts();
          await this.startImport();
          if (this.importer.list.length === 0) await this.syncContacts();
        },
        async reconnect() {
          this.connView.working = true;
          const r = await this.apiFetch('/api/whatsapp/reconnect', { method: 'POST' });
          if (!r) { this.connView.working = false; return; }
          for (let i = 0; i < 20; i++) {
            await new Promise(res => setTimeout(res, 1000));
            await this.loadStatus();
            if (this.wa.qr || this.wa.connected) break;
          }
          this.connView.working = false;
        },
        async disconnect() {
          if (!confirm('Disconnect WhatsApp? Scheduled messages will stop until you reconnect.')) return;
          const r = await this.apiFetch('/api/whatsapp/disconnect', { method: 'POST' });
          if (r) { await this.loadStatus(); this.flash('Disconnected'); }
        },

        async logout() { await this.apiFetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/'; },
      };
    }

    function blankForm() {
      return { name: '', body: '', recipientType: 'contact', recipientId: '', scheduleType: 'daily', timeHour: 8, timeMinute: 0, days: [], intervalValue: 1, intervalUnit: 'hours' };
    }
    function normPhone(raw) {
      let p = (raw || '').trim().replace(/[\s-]/g, '');
      if (/^\d{10}$/.test(p)) p = '+91' + p;
      else if (/^\d{12}$/.test(p)) p = '+' + p;
      else if (/^91\d{10}$/.test(p)) p = '+' + p;
      return /^\+\d{7,15}$/.test(p) ? p : null;
    }
  </script>
