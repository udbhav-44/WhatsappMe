<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>History — WhatsApp Scheduler</title>
  <script defer src="https://unpkg.com/alpinejs@3/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/app.css">
  <style>
    .navbar-brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.25rem; }
    .navbar-right { display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.9rem; }
    .nav-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
    .nav-pill { padding: 0.45rem 1rem; border-radius: 20px; background: #e2e8f0; color: #4a5568; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: background 0.15s; }
    .nav-pill:hover, .nav-pill.active { background: #25D366; color: #fff; }
    .card { cursor: default; margin-bottom: 1rem; }
    .card:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .filter-bar { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.25rem; }
    .filter-bar select { padding: 0.55rem 0.75rem; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 0.95rem; min-width: 150px; flex: 1; }
    .filter-bar label { font-size: 0.82rem; font-weight: 700; color: #4a5568; display: block; margin-bottom: 0.25rem; }
    .filter-field { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.8rem; font-weight: 700; }
    .badge-sent { background: #c6f6d5; color: #276749; }
    .badge-failed { background: #fed7d7; color: #9b2c2c; }
    .badge-missed { background: #e2e8f0; color: #4a5568; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.55rem 0.75rem; border-bottom: 2px solid #e2e8f0; color: #4a5568; font-size: 0.82rem; font-weight: 700; white-space: nowrap; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f0f2f5; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .empty-state { text-align: center; color: #a0aec0; padding: 2.5rem 0; font-size: 0.95rem; }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-top: 1rem; }
    .page-info { font-size: 0.95rem; color: #4a5568; font-weight: 600; }
    .msg-preview { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #4a5568; font-size: 0.88rem; }
    .phone-cell { font-size: 0.88rem; color: #2d3748; font-weight: 600; white-space: nowrap; }
    .sched-name { font-size: 0.82rem; color: #718096; }
    .time-cell { white-space: nowrap; font-size: 0.85rem; color: #718096; }
    .row-num { color: #a0aec0; font-size: 0.82rem; }
    .refresh-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div x-data="historyApp()" x-init="init()">
    <nav class="navbar">
      <a href="/dashboard.html" class="navbar-brand">📅 WA Scheduler</a>
      <div class="navbar-right">
        <span x-text="user?.name"></span>
        <button class="btn btn-sm btn-secondary" @click="logout()">Logout</button>
      </div>
    </nav>

    <main class="container" style="max-width:900px">
      <div class="nav-pills">
        <a href="/dashboard.html" class="nav-pill">🏠 Dashboard</a>
        <a href="/contacts.html" class="nav-pill">👥 Contacts</a>
        <a href="/templates.html" class="nav-pill">📝 Templates</a>
        <a href="/schedules.html" class="nav-pill">⏰ Schedules</a>
        <a href="/history.html" class="nav-pill active">📜 History</a>
      </div>

      <h1 class="page-title">📜 Message History</h1>

      <!-- Filter bar -->
      <div class="card" style="padding:1.25rem">
        <div class="filter-bar">
          <div class="filter-field">
            <label for="f-schedule">Schedule</label>
            <select id="f-schedule" x-model="filters.scheduleId">
              <option value="">All Schedules</option>
              <template x-for="s in schedules" :key="s.id">
                <option :value="s.id" x-text="s.name"></option>
              </template>
            </select>
          </div>

          <div class="filter-field">
            <label for="f-status">Status</label>
            <select id="f-status" x-model="filters.status">
              <option value="">All Statuses</option>
              <option value="sent">✅ Sent</option>
              <option value="failed">❌ Failed</option>
              <option value="missed">⏭ Missed</option>
            </select>
          </div>

          <div style="display:flex;gap:0.5rem;align-items:flex-end">
            <button class="btn btn-sm" @click="applyFilters()">Apply</button>
            <button class="btn btn-sm btn-secondary" @click="resetFilters()">Reset</button>
            <button class="btn btn-sm btn-secondary" @click="loadLogs()">🔄 Refresh</button>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="card" style="padding:1.25rem">
        <div class="refresh-row">
          <strong style="font-size:0.95rem">
            Showing <span x-text="logs.length"></span> of <span x-text="total"></span> entries
          </strong>
          <span style="font-size:0.85rem;color:#a0aec0" x-show="loading">Loading…</span>
        </div>

        <template x-if="logs.length === 0 && !loading">
          <div class="empty-state">No messages found for the selected filters.</div>
        </template>

        <div class="table-wrap" x-show="logs.length > 0">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Contact / Phone</th>
                <th>Message</th>
                <th>Schedule</th>
                <th>Time</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(log, idx) in logs" :key="log.id">
                <tr>
                  <td class="row-num" x-text="(page - 1) * pageSize + idx + 1"></td>
                  <td class="phone-cell" x-text="log.phone || '—'"></td>
                  <td>
                    <div class="msg-preview" :title="log.message_body" x-text="log.message_body ? log.message_body.slice(0,60) + (log.message_body.length > 60 ? '…' : '') : '—'"></div>
                  </td>
                  <td>
                    <div class="sched-name" x-text="log.schedule_name || '—'"></div>
                  </td>
                  <td class="time-cell" x-text="formatTime(log.sent_at)"></td>
                  <td>
                    <span class="badge"
                      :class="log.status === 'sent' ? 'badge-sent' : log.status === 'failed' ? 'badge-failed' : 'badge-missed'"
                      x-text="log.status || '—'"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" x-show="pages > 1">
          <button class="btn btn-sm btn-secondary" @click="goPage(page - 1)" :disabled="page <= 1">← Previous</button>
          <span class="page-info">Page <strong x-text="page"></strong> of <strong x-text="pages"></strong></span>
          <button class="btn btn-sm btn-secondary" @click="goPage(page + 1)" :disabled="page >= pages">Next →</button>
        </div>
      </div>

      <div class="error-msg" x-show="error" x-text="error"></div>
    </main>
  </div>

  <script>
    function historyApp() {
      return {
        user: null,
        logs: [],
        total: 0,
        page: 1,
        pages: 1,
        pageSize: 50,
        loading: false,
        error: '',
        schedules: [],
        filters: { scheduleId: '', status: '' },

        async apiFetch(url, opts = {}) {
          const res = await fetch(url, { credentials: 'include', ...opts });
          if (res.status === 401) { window.location.href = '/'; return null; }
          return res;
        },

        async init() {
          const meRes = await this.apiFetch('/api/auth/me');
          if (!meRes) return;
          this.user = await meRes.json();
          await Promise.all([this.loadSchedules(), this.loadLogs()]);
        },

        async loadSchedules() {
          const res = await this.apiFetch('/api/schedules');
          if (!res) return;
          this.schedules = await res.json();
        },

        async loadLogs() {
          this.loading = true;
          this.error = '';
          try {
            const params = new URLSearchParams({ page: this.page, limit: this.pageSize });
            if (this.filters.scheduleId) params.set('scheduleId', this.filters.scheduleId);
            if (this.filters.status) params.set('status', this.filters.status);

            const res = await this.apiFetch(`/api/logs?${params.toString()}`);
            if (!res) return;
            const data = await res.json();
            this.logs = data.logs || [];
            this.total = data.total || 0;
            this.page = data.page || 1;
            this.pages = data.pages || 1;
          } catch (e) {
            this.error = 'Could not load history.';
          } finally {
            this.loading = false;
          }
        },

        async applyFilters() {
          this.page = 1;
          await this.loadLogs();
        },

        async resetFilters() {
          this.filters = { scheduleId: '', status: '' };
          this.page = 1;
          await this.loadLogs();
        },

        async goPage(p) {
          if (p < 1 || p > this.pages) return;
          this.page = p;
          await this.loadLogs();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        formatTime(ts) {
          if (!ts) return '—';
          // sent_at stored as Unix seconds — multiply by 1000 for JS Date
          return new Date(ts * 1000).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
        },

        async logout() {
          await this.apiFetch('/api/auth/logout', { method: 'POST' });
          window.location.href = '/';
        },
      };
    }
  </script>
</body>
</html>
